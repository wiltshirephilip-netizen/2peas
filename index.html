// Hushålls-ID: sparas lokalt per enhet, delas via inbjudningskod
function getHouseholdId(){
  let hid=localStorage.getItem("peas_household_id");
  if(!hid){hid="hh_"+Math.random().toString(36).slice(2,10);localStorage.setItem("peas_household_id",hid);}
  return hid;
}
const HOUSEHOLD_ID=getHouseholdId();

// Dessa sparas bara lokalt (enhetsspecifikt)
const LOCAL_ONLY=new Set([KEYS.pin,KEYS.pinSession,KEYS.viewer]);

async function dbGet(key){
  try{
    const{data,error}=await window._supa.from("household_data").select("value").eq("id",key+"_"+HOUSEHOLD_ID).maybeSingle();
    if(error||!data)return null;
    return data.value;
  }catch{return null;}
}
async function dbSet(key,value){
  try{
    await window._supa.from("household_data").upsert(
      {id:key+"_"+HOUSEHOLD_ID,household_id:HOUSEHOLD_ID,value,updated_at:new Date().toISOString()},
      {onConflict:"id"}
    );
  }catch(e){console.warn("dbSet error",e);}
}

function useLS(key,init){
  const isLocal=LOCAL_ONLY.has(key);
  const [v,setV]=useState(()=>{
    try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}
  });
  const [synced,setSynced]=useState(isLocal);
  const skipSave=React.useRef(true);

  // Initial load från Supabase
  useEffect(()=>{
    if(isLocal){return;}
    dbGet(key).then(val=>{
      if(val!==null)setV(val);
      setSynced(true);
      skipSave.current=false;
    }).catch(()=>{setSynced(true);skipSave.current=false;});
  },[key]);

  // Realtidssynk från andra enheter
  useEffect(()=>{
    if(isLocal)return;
    const dbKey=key+"_"+HOUSEHOLD_ID;
    const ch=window._supa.channel("rt_"+dbKey)
      .on("postgres_changes",
        {event:"*",schema:"public",table:"household_data",filter:"id=eq."+dbKey},
        payload=>{
          if(payload.new&&payload.new.value!==undefined){
            setV(payload.new.value);
          }
        }
      ).subscribe();
    return()=>window._supa.removeChannel(ch);
  },[key]);

  // Spara vid ändringar
  useEffect(()=>{
    if(skipSave.current)return;
    localStorage.setItem(key,JSON.stringify(v));
    if(!isLocal)dbSet(key,v);
  },[key,v]);

  return[v,setV];
}
function useViewer(){return useLS(KEYS.viewer,"a");}

function fmt(d){return d.toISOString().split("T")[0];}
const TODAY=fmt(new Date());
const WEEKDAYS=["Måndag","Tisdag","Onsdag","Torsdag","Fredag","Lördag","Söndag"];
const WEEKDAYS_SHORT=["Mån","Tis","Ons","Tor","Fre","Lör","Sön"];
const MONTHS=["Januari","Februari","Mars","April","Maj","Juni","Juli","Augusti","September","Oktober","November","December"];

function getNext7Days(){
  // Show from today until end of current week (Friday), max 7 days
  // On Saturday or Sunday: show full next week (Mon-Fri)
  const days=[];
  const now=new Date();
  const todayDow=(now.getDay()+6)%7; // 0=Mon, 6=Sun
  // If today is Saturday (5) or Sunday (6), show next full week Mon-Fri
  const isWeekendNow=todayDow>=5;
  const daysUntilNextMon=isWeekendNow?(8-now.getDay())%7||7:0;
  const startOffset=isWeekendNow?daysUntilNextMon:0;
  // End: reach the coming Friday (dow=4)
  const daysUntilFriday=isWeekendNow?4:(4-todayDow);
  const count=isWeekendNow?5:Math.max(1,daysUntilFriday+1);
  for(let i=startOffset;i<startOffset+count;i++){
    const d=new Date();d.setDate(d.getDate()+i);
    const dow=(d.getDay()+6)%7;
    const label=i===0?"Idag":i===1?"Imorgon":WEEKDAYS[dow];
    days.push({date:fmt(d),label,dow});
  }
  return days;
}
function addDaysStr(s,n){const d=new Date(s+"T12:00:00");d.setDate(d.getDate()+n);return fmt(d);}
function daysBetween(a,b){return Math.round((new Date(b+"T12:00:00")-new Date(a+"T12:00:00"))/86400000);}

// Normalize time: handles 9, 930, 1830, 09:00, 9:30 etc.
function normalizeTime(t){
  if(!t||!t.trim())return null;
  const s=t.trim().replace(/[^0-9:]/g,"");
  // Already HH:MM
  if(/^\d{1,2}:\d{2}$/.test(s)){
    const[h,m]=s.split(":").map(Number);
    if(h>=0&&h<=23&&m>=0&&m<=59)return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
    return null;
  }
  // Pure digits: 9→09:00, 19→19:00, 930→09:30, 1830→18:30
  if(/^\d{1,4}$/.test(s)){
    const n=parseInt(s);
    if(s.length<=2){const h=n;if(h>=0&&h<=23)return`${String(h).padStart(2,"0")}:00`;}
    if(s.length===3){const h=parseInt(s[0]),m=parseInt(s.slice(1));if(h>=0&&h<=23&&m>=0&&m<=59)return`0${h}:${String(m).padStart(2,"0")}`;}
    if(s.length===4){const h=parseInt(s.slice(0,2)),m=parseInt(s.slice(2));if(h>=0&&h<=23&&m>=0&&m<=59)return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;}
  }
  return null; // invalid
}
function fmtEvTime(ev){
  if(ev.allDay)return"Hela dagen";
  if(!ev.time)return"";
  return ev.endTime&&ev.endTime!==ev.time?`${ev.time}–${ev.endTime}`:ev.time;
}

// Multi-day expansion
function expandMultiDayEvents(events){
  const out=[];
  events.forEach(ev=>{
    if(ev.endDate&&ev.endDate>ev.date){
      let d=ev.date;
      while(d<=ev.endDate){
        out.push({...ev,date:d,_multiDay:true,_multiFirst:d===ev.date,_multiLast:d===ev.endDate});
        d=addDaysStr(d,1);
      }
    } else {
      out.push(ev);
    }
  });
  return out;
}

// Expand recurring events (user-defined recurrence)
function expandRecurringUserEvents(events,fromDate,toDate){
  const out=[];
  events.forEach(ev=>{
    if(!ev.recurrence||ev.recurrence==="none"){out.push(ev);return;}
    const exceptions=new Set(ev.exceptions||[]);
    let d=ev.date;
    let count=0;
    while(d<=toDate&&count<500){
      if(d>=fromDate&&!exceptions.has(d)){
        out.push({...ev,date:d,_recurInstance:true,_recurBase:ev.id});
      }
      count++;
      switch(ev.recurrence){
        case"daily": d=addDaysStr(d,1);break;
        case"weekly": d=addDaysStr(d,7);break;
        case"monthly":{const dt=new Date(d+"T12:00:00");dt.setMonth(dt.getMonth()+1);d=fmt(dt);break;}
        case"yearly":{const dt=new Date(d+"T12:00:00");dt.setFullYear(dt.getFullYear()+1);d=fmt(dt);break;}
        default: d=addDaysStr(d,999);
      }
    }
  });
  return out;
}

// No fixed recurring reminders - users add their own via the calendar

const REMIND_OPTS=[
  {id:"1w",days:7,label:"1 vecka"},{id:"1m",days:30,label:"1 månad"},
  {id:"3m",days:90,label:"3 månader"},{id:"6m",days:180,label:"6 månader"},
  {id:"custom",days:null,label:"Anpassat"},
];
function expiryAlertDate(item){
  const d=daysBetween(TODAY,item.expires);
  const lead=item.remindDays!=null?item.remindDays:(REMIND_OPTS.find(r=>r.id===item.remind)?.days??30);
  return d>=0&&d<=lead;
}
function expiryToCalendarEvents(items){
  const out=[];
  (items||[]).forEach(ex=>{
    out.push({id:`exp-${ex.id}`,title:`${ex.icon||"📋"} ${ex.title} utgår`,date:ex.expires,person:"both",color:"#d35400",isExpiry:true});
    const lead=ex.remindDays??(REMIND_OPTS.find(r=>r.id===ex.remind)?.days??30);
    const remindOn=addDaysStr(ex.expires,-lead);
    if(remindOn!==ex.expires&&remindOn>=TODAY){
      out.push({id:`exp-r-${ex.id}`,title:`${ex.icon||"📋"} Påminn: ${ex.title}`,date:remindOn,person:"both",color:"#e67e22",isExpiry:true});
    }
  });
  return out;
}

// Conflict detection
function timeToMin(t){if(!t)return null;const[h,m]=t.split(":").map(Number);return isNaN(h)?null:h*60+m;}
function evEnd(ev){const s=timeToMin(ev.time);if(s==null)return null;const e=timeToMin(ev.endTime);return(e!=null&&e>s)?e:s+60;}
function overlap(a,b){const aS=timeToMin(a.time),bS=timeToMin(b.time);if(aS==null||bS==null)return true;return aS<evEnd(b)&&bS<evEnd(a);}
function persEvs(evs,pid){return evs.filter(e=>e.person===pid||e.person==="both");}
function hasDayConflict(dayEvs){
  const evs=dayEvs.filter(e=>!e.recurring&&!e.isExpiry);
  const check=pid=>{const mine=persEvs(evs,pid);if(mine.length<2)return false;if(mine.length>=4)return true;const t=mine.filter(e=>e.time&&!e.allDay);if(t.length>=2)for(let i=0;i<t.length;i++)for(let j=i+1;j<t.length;j++)if(overlap(t[i],t[j]))return true;if(mine.length>=2&&t.length<mine.length)return true;return false;};
  return check("a")||check("b");
}
function isHighLoad(dayEvs){const evs=dayEvs.filter(e=>!e.recurring&&!e.isExpiry);return persEvs(evs,"a").length>=3||persEvs(evs,"b").length>=3;}

// Pickup helpers
function cyclePickupPerson(id){if(id==="a")return"b";if(id==="b")return null;return"a";}
function getPickupForDay(pickupData,dow,dateStr){const pd=pickupData[dow]||{};const ov=pd.overrides&&pd.overrides[dateStr];return ov||pd;}
function isPickupAssigned(slot,f){if(!slot)return false;const id=slot[f];if(!id)return false;if(id==="other")return!!(slot[f+"Name"]?.trim());return true;}
function slotHasPickup(slot){return isPickupAssigned(slot,"dropPerson")||isPickupAssigned(slot,"pickPerson");}
// Pickup clash detection: does a calendar event overlap a pickup window for the assigned person?
const DROP_WIN=[7*60,8*60+30]; // 07:00-08:30
const PICK_WIN=[16*60,17*60+30]; // 16:00-17:30
function pickupClash(slot,dayEvs){
  const clashes=[];
  // Check drop (lämning)
  if(isPickupAssigned(slot,"dropPerson")){
    const pid=slot.dropPerson; // "a","b", or "other"
    if(pid!=="other"){
      const evs=dayEvs.filter(e=>{
        if(e.allDay||!e.time)return false;
        const pid2=e.person;
        return pid2===pid||pid2==="both";
      });
      for(const ev of evs){
        const s=timeToMin(ev.time),en=evEnd(ev);
        if(s!=null&&s<DROP_WIN[1]&&en>DROP_WIN[0])clashes.push({type:"drop",person:pid,ev});
      }
    }
  }
  // Check pick (hämtning)
  if(isPickupAssigned(slot,"pickPerson")){
    const pid=slot.pickPerson;
    if(pid!=="other"){
      const evs=dayEvs.filter(e=>{
        if(e.allDay||!e.time)return false;
        const pid2=e.person;
        return pid2===pid||pid2==="both";
      });
      for(const ev of evs){
        const s=timeToMin(ev.time),en=evEnd(ev);
        if(s!=null&&s<PICK_WIN[1]&&en>PICK_WIN[0])clashes.push({type:"pick",person:pid,ev});
      }
    }
  }
  return clashes;
}

function slotsMatchBase(slot,base){return slot.dropPerson===base.dropPerson&&slot.pickPerson===base.pickPerson&&(slot.dropPersonName||"")===(base.dropPersonName||"")&&(slot.pickPersonName||"")===(base.pickPersonName||"");}
function applyPickupCycle(slot,field,next){const nf=field+"Name";const out={...slot,[field]:next};if(next!=="other")delete out[nf];return out;}

function PickupPersonBadge({slot,personField,emoji}){
  if(!isPickupAssigned(slot,personField))return null;

function todoVisibility(vid,hf){if(!hf)return"both";const partner=vid==="a"?"b":"a";return hf===partner?"me":"both";}

  {id:"bjud",label:"Bjudmiddag",color:"#7b7cb8",bg:"#eef0f8"},
];
const RECIPE_PRICE=[
  {id:"budget",label:"Budget",color:"#5a8c5a"},
  {id:"normal",label:"Normal",color:"#b8815a"},
  {id:"lyxigt",label:"Lyxigt",color:"#c0392b"},
];
const RECIPE_TIME=[
  {id:"quick",label:"< 30 min"},{id:"medium",label:"30–60 min"},{id:"long",label:"> 60 min"},
];

function StarRating({value,onChange,size=18}){
  const [hover,setHover]=useState(0);
  return(
    <div style={{display:"flex",gap:4}}>
      {[1,2,3,4,5].map(n=>(
        <button key={n} onMouseEnter={()=>setHover(n)} onMouseLeave={()=>setHover(0)} onClick={()=>onChange(n===value?0:n)} style={{background:"none",border:"none",cursor:"pointer",padding:0}}>
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={(hover||value)>=n?"#f39c12":"none"} stroke="#f39c12" strokeWidth={1.5}>
            <path strokeLinecap="round" strokeLinejoin="round" d={PATHS.star}/>
          </svg>
        </button>
      ))}
    </div>
  );
}

function parseIngLine(line){const t=line.trim();if(!t)return null;const m=t.match(/^(.+?)[,;]\s*(.+)$/);return m?{name:m[1].trim(),qty:m[2].trim()}:{name:t,qty:""};}

function RecipeForm({initial,onSave,onClose}){
  const [f,setF]=useState(()=>initial||{title:"",url:"",ambition:"enkel",price:"normal",time:"medium",rating:0,ingredientsText:""});
  const save=()=>{
    if(!f.title.trim())return;
    const ingredients=f.ingredientsText.split("\n").map(parseIngLine).filter(Boolean);
    // url is optional – save empty string as null
    onSave({...f,title:f.title.trim(),ingredients,url:f.url?.trim()||null});
    onClose();
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <input style={inp} placeholder="Receptnamn*" value={f.title} onChange={e=>setF({...f,title:e.target.value})} autoFocus/>
      <input style={inp} placeholder="Länk till recept (valfritt)" value={f.url||""} onChange={e=>setF({...f,url:e.target.value})}/>
      <div>
        <div style={{fontSize:12,color:"#9b9186",marginBottom:6}}>Ambitionsnivå</div>
        <div style={{display:"flex",gap:8}}>
          {RECIPE_AMBITION.map(a=>(<button key={a.id} onClick={()=>setF({...f,ambition:a.id})} style={{flex:1,padding:"8px 4px",borderRadius:10,fontSize:11,cursor:"pointer",fontFamily:"inherit",background:f.ambition===a.id?a.bg:"#ede8e1",color:f.ambition===a.id?a.color:"#6b6357",border:f.ambition===a.id?`1.5px solid ${a.color}44`:"1.5px solid transparent"}}>{a.label}</button>))}
        </div>
      </div>
      <div>
        <div style={{fontSize:12,color:"#9b9186",marginBottom:6}}>Tillagningstid</div>
        <div style={{display:"flex",gap:8}}>
          {RECIPE_TIME.map(t=>(<button key={t.id} onClick={()=>setF({...f,time:t.id})} style={{flex:1,padding:"8px 4px",borderRadius:10,fontSize:12,cursor:"pointer",fontFamily:"inherit",background:f.time===t.id?"#2c2420":"#ede8e1",color:f.time===t.id?"#fff":"#6b6357",border:"none"}}>{t.label}</button>))}
        </div>
      </div>
      <div>
        <div style={{fontSize:12,color:"#9b9186",marginBottom:6}}>Pris per portion</div>
        <div style={{display:"flex",gap:8}}>
          {RECIPE_PRICE.map(p=>(<button key={p.id} onClick={()=>setF({...f,price:p.id})} style={{flex:1,padding:"8px 4px",borderRadius:10,fontSize:12,cursor:"pointer",fontFamily:"inherit",background:f.price===p.id?"#2c2420":"#ede8e1",color:f.price===p.id?"#fff":"#6b6357",border:"none"}}>{p.label}</button>))}
        </div>
      </div>
      <div>
        <div style={{fontSize:12,color:"#9b9186",marginBottom:6}}>Betyg</div>
        <StarRating value={f.rating||0} onChange={v=>setF({...f,rating:v})}/>
      </div>
      <div>
        <div style={{fontSize:12,color:"#9b9186",marginBottom:6}}>Ingredienser (en per rad, t.ex. "Mjölk, 2 st")</div>
        <textarea style={{...inp,minHeight:120,resize:"vertical"}} value={f.ingredientsText||""} onChange={e=>setF({...f,ingredientsText:e.target.value})}/>
      </div>
      <button style={btnP} onClick={save}>Spara recept</button>
    </div>
  );
}

            <button onClick={()=>onEdit(r)} style={{height:36,padding:"0 12px",borderRadius:10,background:"#ede8e1",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#6b6357",fontFamily:"inherit"}}><Ic n="pencil" s={14} color="#6b6357"/> Redigera</button>

function Grocery(){
  const [sub,setSub]=useState("list");
  const [items,setItems]=useLS(KEYS.grocery,[{id:1,name:"Mjölk",qty:"2 st",person:"a",done:false},{id:2,name:"Pasta",qty:"500 g",person:"b",done:false}]);
  const [recipes,setRecipes]=useLS(KEYS.recipes,[]);
  const defaultCats=["Mejeri","Frukt & grönt","Kött & fisk","Torrvaror","Hygien","Hushåll","Övrigt"];
  const [groceryCats,setGroceryCats]=useLS(KEYS.groceryCats,defaultCats);
  const [f,setF]=useState({name:"",qty:"",person:"a",cat:""});
  const [groceryTemplates,setGroceryTemplates]=useLS(KEYS.groceryTemplates,[]);
  const [showTplMgr,setShowTplMgr]=useState(false);
  const [editTpl,setEditTpl]=useState(null); // null | {id,name,items:[{name,qty,cat}]}
  const [tplForm,setTplForm]=useState({name:"",items:[]});
  const [tplItemRow,setTplItemRow]=useState({name:"",qty:"",cat:""});

  const openNewTpl=()=>{setTplForm({name:"",items:[]});setTplItemRow({name:"",qty:"",cat:""});setEditTpl("new");};
  const openEditTpl=(tpl)=>{setTplForm({name:tpl.name,items:tpl.items.map(i=>({...i}))});setTplItemRow({name:"",qty:"",cat:""});setEditTpl(tpl.id);};
  const saveTpl=()=>{
    if(!tplForm.name.trim()||tplForm.items.length===0)return;
    if(editTpl==="new"){
      setGroceryTemplates(prev=>[...prev,{id:Date.now(),name:tplForm.name.trim(),items:tplForm.items}]);
    } else {
      setGroceryTemplates(prev=>prev.map(t=>t.id===editTpl?{...t,name:tplForm.name.trim(),items:tplForm.items}:t));
    }
    setEditTpl(null);
  };
  const deleteTpl=(id)=>setGroceryTemplates(prev=>prev.filter(t=>t.id!==id));
  const loadTpl=(tpl)=>{
    const now=Date.now();
    const newItems=tpl.items.map((it,i)=>({id:now+i,name:it.name,qty:it.qty||"",cat:it.cat||"",person:"a",done:false}));
    setItems(prev=>[...prev,...newItems.filter(ni=>!prev.some(ex=>ex.name.toLowerCase()===ni.name.toLowerCase()))]);
  };
  const addTplItem=()=>{
    if(!tplItemRow.name.trim())return;
    setTplForm(prev=>({...prev,items:[...prev.items,{name:tplItemRow.name.trim(),qty:tplItemRow.qty.trim(),cat:tplItemRow.cat}]}));
    setTplItemRow({name:"",qty:"",cat:""});
  };
  const removeTplItem=(i)=>setTplForm(prev=>({...prev,items:prev.items.filter((_,j)=>j!==i)}));
  const nameRef=useRef(null);
  const [showClearAll,setShowClearAll]=useState(false);
  const [showRecipeForm,setShowRecipeForm]=useState(false);
  const [editRecipe,setEditRecipe]=useState(null);
  const [recipeFilter,setRecipeFilter]=useState({ambition:"",time:"",minRating:0});
  const [showCatMgr,setShowCatMgr]=useState(false);
  const [newCatName,setNewCatName]=useState("");
  const [editItemId,setEditItemId]=useState(null);
  const [editItemForm,setEditItemForm]=useState({name:"",qty:"",cat:""});

  const toggle=id=>setItems(p=>p.map(i=>i.id===id?{...i,done:!i.done}:i));
  const remove=id=>setItems(p=>p.filter(i=>i.id!==id));
  const doneCount=items.filter(i=>i.done).length;
  const add=()=>{
    if(!f.name.trim())return;
    setItems(p=>[...p,{id:Date.now(),name:f.name.trim(),qty:f.qty.trim(),person:f.person,cat:f.cat||"",done:false}]);
    setF(p=>({...p,name:"",qty:""}));
    setTimeout(()=>nameRef.current&&nameRef.current.focus(),10);
  };
  const addFromRecipe=r=>{
    const now=Date.now();
    setItems(p=>[...p,...r.ingredients.map((ing,i)=>({id:now+i,name:ing.name,qty:ing.qty||"",person:"a",cat:"",done:false,recipeId:r.id,recipeName:r.title}))]);
    setSub("list");
  };
  const saveRecipe=data=>{
    if(editRecipe)setRecipes(prev=>prev.map(r=>r.id===editRecipe?{...r,...data}:r));
    else setRecipes(prev=>[...prev,{id:Date.now(),...data}]);
    setEditRecipe(null);
  };

  // Group: recipe items by recipe, free items by category
  const recipeItemsByRecipe={};
  const freeItemsByCat={};
  items.forEach(i=>{
    if(i.recipeId){
      if(!recipeItemsByRecipe[i.recipeId])recipeItemsByRecipe[i.recipeId]={name:i.recipeName,items:[]};
      recipeItemsByRecipe[i.recipeId].items.push(i);
    } else {
      const cat=i.cat||"";
      if(!freeItemsByCat[cat])freeItemsByCat[cat]=[];
      freeItemsByCat[cat].push(i);
    }
  });
  // Sort: uncategorized first (""), then named cats
  const catOrder=["", ...groceryCats];
  const sortedCatEntries=Object.entries(freeItemsByCat).sort(([a],[b])=>{
    const ai=catOrder.indexOf(a),bi=catOrder.indexOf(b);
    return(ai===-1?999:ai)-(bi===-1?999:bi);
  });

  const filteredRecipes=recipes.filter(r=>{
    if(recipeFilter.ambition&&r.ambition!==recipeFilter.ambition)return false;
    if(recipeFilter.time&&r.time!==recipeFilter.time)return false;
    if(recipeFilter.minRating&&(r.rating||0)<recipeFilter.minRating)return false;
    return true;
  });

  const openEditItem=(it)=>{
    setEditItemId(it.id);
    setEditItemForm({name:it.name,qty:it.qty||"",cat:it.cat||""});
  };
  const saveEditItem=()=>{
    if(!editItemForm.name.trim())return;
    setItems(prev=>prev.map(i=>i.id===editItemId?{...i,name:editItemForm.name.trim(),qty:editItemForm.qty.trim(),cat:editItemForm.cat}:i));
    setEditItemId(null);
  };

  const renderItem=(it,isLast)=>{
    const p=PERSONS.find(p=>p.id===it.person);
    const isEditing=editItemId===it.id;
    if(isEditing) return(
      <div key={it.id} style={{padding:"10px 14px",borderBottom:isLast?"none":"0.5px solid #f2ede6",background:"#faf8f5"}}>
        <div style={{display:"flex",gap:6,marginBottom:8}}>
          <input autoFocus style={{...inp,flex:3,fontSize:14,padding:"8px 10px"}} value={editItemForm.name}
            onChange={e=>setEditItemForm({...editItemForm,name:e.target.value})}
            onKeyDown={e=>e.key==="Enter"&&saveEditItem()}/>
          <input style={{...inp,flex:1,fontSize:14,padding:"8px 8px",textAlign:"center",minWidth:60}} placeholder="Mängd" value={editItemForm.qty}
            onChange={e=>setEditItemForm({...editItemForm,qty:e.target.value})}
            onKeyDown={e=>e.key==="Enter"&&saveEditItem()}/>
        </div>
        <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap"}}>
          <button onClick={()=>setEditItemForm({...editItemForm,cat:""})} style={{padding:"3px 8px",borderRadius:12,fontSize:11,cursor:"pointer",fontFamily:"inherit",background:editItemForm.cat===""?"#2c2420":"#ede8e1",color:editItemForm.cat===""?"#fff":"#6b6357",border:"none"}}>Ingen</button>
          {groceryCats.map(c=>(<button key={c} onClick={()=>setEditItemForm({...editItemForm,cat:c===editItemForm.cat?"":c})} style={{padding:"3px 8px",borderRadius:12,fontSize:11,cursor:"pointer",fontFamily:"inherit",border:"none",background:editItemForm.cat===c?"#b8815a":"#ede8e1",color:editItemForm.cat===c?"#fff":"#6b6357"}}>{c}</button>))}
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={saveEditItem} style={{flex:1,padding:"7px",borderRadius:10,background:"#2c2420",color:"#fff",border:"none",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>Spara</button>
          <button onClick={()=>setEditItemId(null)} style={{flex:1,padding:"7px",borderRadius:10,background:"#ede8e1",color:"#6b6357",border:"none",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>Avbryt</button>
        </div>
      </div>
    );
    return(
      <div key={it.id} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderBottom:isLast?"none":"0.5px solid #f2ede6",opacity:it.done?0.45:1,transition:"opacity .2s"}}>
        <button onClick={()=>toggle(it.id)} style={{width:22,height:22,borderRadius:"50%",flexShrink:0,border:it.done?"none":"1.5px solid #d6d0c4",background:it.done?"#b8815a":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",padding:0}}>
          {it.done&&<Ic n="check" s={13} color="#fff"/>}
        </button>
        <span onClick={()=>!it.done&&openEditItem(it)} style={{fontSize:15,color:"#2c2420",textDecoration:it.done?"line-through":"none",flex:1,cursor:it.done?"default":"pointer"}}>{it.name}</span>
        {it.qty&&<span onClick={()=>!it.done&&openEditItem(it)} style={{fontSize:12,color:"#9b9186",flexShrink:0,cursor:it.done?"default":"pointer",background:"#f7f4ef",borderRadius:6,padding:"2px 6px"}}>{it.qty}</span>}
        {!it.qty&&!it.done&&<button onClick={()=>openEditItem(it)} style={{fontSize:11,color:"#c4bcaf",background:"none",border:"none",cursor:"pointer",padding:"2px 4px",fontFamily:"inherit"}}>+ mängd</button>}
        <Av p={p} s={22}/>
        <button onClick={()=>remove(it.id)} style={{background:"none",border:"none",color:"#d6d0c4",cursor:"pointer",padding:2,flexShrink:0}}><Ic n="x" s={16}/></button>
      </div>
    );
  };

  if(sub==="recipes") return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <button onClick={()=>setSub("list")} style={{flex:1,padding:"8px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:"inherit",background:"#ede8e1",color:"#6b6357"}}>Inköpslista</button>
        <button style={{flex:1,padding:"8px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:"inherit",background:"#2c2420",color:"#fff",fontWeight:500}}>Recept</button>
      </div>
      <SHdr title="Recept" onAdd={()=>{setEditRecipe(null);setShowRecipeForm(true);}}/>
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
          <span style={{fontSize:11,color:"#9b9186",alignSelf:"center"}}>Filtrera:</span>
          {RECIPE_AMBITION.map(a=>(<button key={a.id} onClick={()=>setRecipeFilter(f=>({...f,ambition:f.ambition===a.id?"":a.id}))} style={{padding:"4px 10px",borderRadius:16,fontSize:11,cursor:"pointer",fontFamily:"inherit",background:recipeFilter.ambition===a.id?a.bg:"#ede8e1",color:recipeFilter.ambition===a.id?a.color:"#6b6357",border:"none"}}>{a.label}</button>))}
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {RECIPE_TIME.map(t=>(<button key={t.id} onClick={()=>setRecipeFilter(f=>({...f,time:f.time===t.id?"":t.id}))} style={{padding:"4px 10px",borderRadius:16,fontSize:11,cursor:"pointer",fontFamily:"inherit",background:recipeFilter.time===t.id?"#2c2420":"#ede8e1",color:recipeFilter.time===t.id?"#fff":"#6b6357",border:"none"}}>{t.label}</button>))}
          {[3,4,5].map(n=>(<button key={n} onClick={()=>setRecipeFilter(f=>({...f,minRating:f.minRating===n?0:n}))} style={{padding:"4px 10px",borderRadius:16,fontSize:11,cursor:"pointer",fontFamily:"inherit",background:recipeFilter.minRating===n?"#f39c12":"#ede8e1",color:recipeFilter.minRating===n?"#fff":"#6b6357",border:"none"}}>{"★".repeat(n)}+</button>))}
        </div>
      </div>
      {filteredRecipes.length===0&&<Empty n="spark" text={recipes.length===0?"Spara ert första recept!":"Inga recept matchar filtret"}/>}
      {filteredRecipes.map(r=>(<RecipeCard key={r.id} r={r} onAddToList={addFromRecipe} onEdit={r=>{setEditRecipe(r.id);setShowRecipeForm(true);}} onDelete={id=>setRecipes(prev=>prev.filter(r=>r.id!==id))}/>))}
      {showRecipeForm&&(
        <Modal title={editRecipe?"Redigera recept":"Nytt recept"} onClose={()=>{setShowRecipeForm(false);setEditRecipe(null);}}>
          <RecipeForm
            initial={editRecipe?(()=>{const r=recipes.find(r=>r.id===editRecipe);return r?{...r,ingredientsText:(r.ingredients||[]).map(i=>i.qty?`${i.name}, ${i.qty}`:i.name).join("\n")}:null;})():null}
            onSave={saveRecipe} onClose={()=>{setShowRecipeForm(false);setEditRecipe(null);}}
          />
        </Modal>
      )}
    </div>
  );

  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <button style={{flex:1,padding:"8px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:"inherit",background:"#2c2420",color:"#fff",fontWeight:500}}>Inköpslista</button>
        <button onClick={()=>setSub("recipes")} style={{flex:1,padding:"8px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:"inherit",background:"#ede8e1",color:"#6b6357"}}>Recept {recipes.length>0&&`(${recipes.length})`}</button>
      </div>
      <SHdr title="Inköpslista">
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {doneCount>0&&<button onClick={()=>setItems(items.filter(i=>!i.done))} style={{background:"none",border:"none",color:"#b8815a",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Rensa {doneCount} avb.</button>}
          {items.length>0&&<button onClick={()=>setShowClearAll(true)} style={{background:"none",border:"none",color:"#c0392b",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Rensa allt</button>}
          <button onClick={()=>setShowTplMgr(true)} title="Matmallar" style={{background:"none",border:"none",cursor:"pointer",color:"#9b9186",padding:2}}><Ic n="template" s={18}/></button>
          <button onClick={()=>setShowCatMgr(true)} title="Hantera kategorier" style={{background:"none",border:"none",cursor:"pointer",color:"#9b9186",padding:2}}><Ic n="tag" s={18}/></button>
        </div>
      </SHdr>

      {/* Inline add row */}
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
        <div style={{display:"flex",gap:6,flex:"1 1 100%",alignItems:"center"}}>
          <input ref={nameRef} style={{...inp,flex:3,fontSize:14,padding:"10px 12px"}} placeholder="Lägg till vara..." value={f.name} onChange={e=>setF({...f,name:e.target.value})} onKeyDown={e=>e.key==="Enter"&&add()}/>
          <input style={{...inp,flex:1,fontSize:14,padding:"10px 8px",textAlign:"center",minWidth:52}} placeholder="Mängd" value={f.qty} onChange={e=>setF({...f,qty:e.target.value})} onKeyDown={e=>e.key==="Enter"&&add()}/>
          {PERSONS.map(p=>(<button key={p.id} onClick={()=>setF({...f,person:p.id})} title={p.label} style={{width:36,height:36,borderRadius:10,border:f.person===p.id?`2px solid ${p.color}`:"2px solid transparent",background:f.person===p.id?p.bg:"#ede8e1",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,padding:0}}><Av p={p} s={21}/></button>))}
          <button onClick={add} style={{width:36,height:36,borderRadius:10,background:"#b8815a",border:"none",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,padding:0}}><Ic n="plus" s={18}/></button>
        </div>
        {/* Category row */}
        <div style={{display:"flex",gap:5,flex:"1 1 100%",flexWrap:"wrap"}}>
          <button onClick={()=>setF({...f,cat:""})} style={{padding:"4px 10px",borderRadius:14,fontSize:11,cursor:"pointer",fontFamily:"inherit",background:f.cat===""?"#2c2420":"#ede8e1",color:f.cat===""?"#fff":"#6b6357",border:"none"}}>Ingen</button>
          {groceryCats.map(c=>(<button key={c} onClick={()=>setF({...f,cat:c===f.cat?"":c})} style={{padding:"4px 10px",borderRadius:14,fontSize:11,cursor:"pointer",fontFamily:"inherit",background:f.cat===c?"#b8815a":"#ede8e1",color:f.cat===c?"#fff":"#6b6357",border:"none"}}>{c}</button>))}
        </div>
      </div>

      {items.length===0&&<Empty n="cart" text="Skriv en vara ovan och tryck Enter!"/>}

      {/* Render free items grouped by category */}
      {sortedCatEntries.map(([cat,catItems])=>(
        <div key={cat||"__none"} style={{marginBottom:10}}>
          {cat&&<div style={{fontSize:11,fontWeight:600,color:"#9b9186",marginBottom:5,letterSpacing:.5}}>{cat.toUpperCase()}</div>}
          <Card>{catItems.map((it,i)=>renderItem(it,i===catItems.length-1))}</Card>
        </div>
      ))}

      {/* Recipe groups */}
      {Object.entries(recipeItemsByRecipe).map(([rid,group])=>(
        <div key={rid} style={{marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <span style={{fontSize:12,fontWeight:600,color:"#b8815a"}}>🍽 {group.name}</span>
            <button onClick={()=>setItems(items.filter(i=>String(i.recipeId)!==String(rid)))} style={{fontSize:11,color:"#c4bcaf",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>Ta bort</button>
          </div>
          <Card>{group.items.map((it,i)=>renderItem(it,i===group.items.length-1))}</Card>
        </div>
      ))}

      {showClearAll&&<ConfirmModal title="Rensa hela listan?" message="Alla varor tas bort permanent. Det går inte att ångra." confirmLabel="Ja, rensa allt" danger onConfirm={()=>setItems([])} onClose={()=>setShowClearAll(false)}/>}

      {/* Template manager */}
      {showTplMgr&&(
        <Modal title="Matmallar" onClose={()=>setShowTplMgr(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {groceryTemplates.length===0&&<div style={{textAlign:"center",color:"#9b9186",padding:"16px 0",fontSize:14}}>Inga mallar än. Skapa din första!</div>}
            {groceryTemplates.map(tpl=>(
              <div key={tpl.id} style={{background:"#f7f4ef",borderRadius:12,padding:"12px 14px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <span style={{flex:1,fontSize:14,fontWeight:500,color:"#2c2420"}}>{tpl.name}</span>
                  <span style={{fontSize:11,color:"#9b9186"}}>{tpl.items.length} varor</span>
                  <button onClick={()=>{openEditTpl(tpl);setShowTplMgr(false);}} style={{background:"none",border:"none",color:"#9b9186",cursor:"pointer",padding:2}}><Ic n="pencil" s={15}/></button>
                  <button onClick={()=>deleteTpl(tpl.id)} style={{background:"none",border:"none",color:"#d6d0c4",cursor:"pointer",padding:2}}><Ic n="trash" s={15} color="#c0392b"/></button>
                </div>
                <div style={{fontSize:11,color:"#9b9186",marginBottom:8}}>{tpl.items.map(i=>i.name).join(", ")}</div>
                <button onClick={()=>{loadTpl(tpl);setShowTplMgr(false);}} style={{width:"100%",padding:"8px",borderRadius:10,background:"#b8815a",color:"#fff",border:"none",fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:500}}>+ Lägg till i listan</button>
              </div>
            ))}
            <button onClick={()=>{setShowTplMgr(false);openNewTpl();}} style={{...btnP,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><Ic n="plus" s={16} color="#fff"/> Ny mall</button>
          </div>
        </Modal>
      )}

      {/* Create / edit template modal */}
      {editTpl!==null&&(
        <Modal title={editTpl==="new"?"Ny mall":"Redigera mall"} onClose={()=>setEditTpl(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <input style={inp} placeholder="Mallnamn (t.ex. Basvaror, Frukost...)" value={tplForm.name}
              onChange={e=>setTplForm(p=>({...p,name:e.target.value}))} autoFocus/>

            {/* Existing items */}
            {tplForm.items.length>0&&(
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {tplForm.items.map((it,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:"#f7f4ef",borderRadius:10,padding:"8px 12px"}}>
                    <span style={{flex:1,fontSize:13,color:"#2c2420"}}>{it.name}{it.qty&&<span style={{color:"#9b9186"}}> · {it.qty}</span>}{it.cat&&<span style={{color:"#b8815a"}}> · {it.cat}</span>}</span>
                    <button onClick={()=>removeTplItem(i)} style={{background:"none",border:"none",color:"#d6d0c4",cursor:"pointer",padding:2}}><Ic n="x" s={15}/></button>
                  </div>
                ))}
              </div>
            )}

            {/* Add item row */}
            <div style={{background:"#f7f4ef",borderRadius:12,padding:"10px 12px",display:"flex",flexDirection:"column",gap:8}}>
              <div style={{fontSize:11,fontWeight:600,color:"#9b9186",letterSpacing:.4}}>LÄGG TILL VARA</div>
              <div style={{display:"flex",gap:6}}>
                <input style={{...inp,flex:3,padding:"8px 10px",fontSize:13}} placeholder="Vara" value={tplItemRow.name}
                  onChange={e=>setTplItemRow(p=>({...p,name:e.target.value}))}
                  onKeyDown={e=>e.key==="Enter"&&addTplItem()}/>
                <input style={{...inp,flex:1,padding:"8px 8px",fontSize:13,textAlign:"center",minWidth:56}} placeholder="Mängd" value={tplItemRow.qty}
                  onChange={e=>setTplItemRow(p=>({...p,qty:e.target.value}))}
                  onKeyDown={e=>e.key==="Enter"&&addTplItem()}/>
              </div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                <button onClick={()=>setTplItemRow(p=>({...p,cat:""}))} style={{padding:"3px 8px",borderRadius:12,fontSize:11,cursor:"pointer",fontFamily:"inherit",background:tplItemRow.cat===""?"#2c2420":"#ede8e1",color:tplItemRow.cat===""?"#fff":"#6b6357",border:"none"}}>Ingen</button>
                {groceryCats.map(c=>(<button key={c} onClick={()=>setTplItemRow(p=>({...p,cat:p.cat===c?"":c}))} style={{padding:"3px 8px",borderRadius:12,fontSize:11,cursor:"pointer",fontFamily:"inherit",border:"none",background:tplItemRow.cat===c?"#b8815a":"#ede8e1",color:tplItemRow.cat===c?"#fff":"#6b6357"}}>{c}</button>))}
              </div>
              <button onClick={addTplItem} style={{...btnP,padding:"8px"}}><Ic n="plus" s={15} color="#fff"/> Lägg till vara</button>
            </div>

            <button onClick={saveTpl} disabled={!tplForm.name.trim()||tplForm.items.length===0}
              style={{...btnP,opacity:(!tplForm.name.trim()||tplForm.items.length===0)?0.4:1}}>
              {editTpl==="new"?"Spara mall":"Uppdatera mall"}
            </button>
          </div>
        </Modal>
      )}

      {/* Category manager */}
      {showCatMgr&&(
        <Modal title="Kategorier" onClose={()=>setShowCatMgr(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {groceryCats.map((c,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,background:"#f7f4ef",borderRadius:10,padding:"9px 12px"}}>
                  <span style={{flex:1,fontSize:14,color:"#2c2420"}}>{c}</span>
                  <button onClick={()=>setGroceryCats(groceryCats.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"#d6d0c4",cursor:"pointer",padding:2}}><Ic n="x" s={16}/></button>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <input style={{...inp,flex:1}} placeholder="Ny kategori…" value={newCatName} onChange={e=>setNewCatName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&newCatName.trim()&&(setGroceryCats([...groceryCats,newCatName.trim()]),setNewCatName(""))}/>
              <button onClick={()=>{if(newCatName.trim()){setGroceryCats([...groceryCats,newCatName.trim()]);setNewCatName("");}}} style={{width:44,height:44,borderRadius:12,background:"#b8815a",border:"none",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,padding:0}}><Ic n="plus" s={18}/></button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── TODO ─────────────────────────────────────────────────────────────────────
const BUCKETS=[
  {id:"today",label:"Prioriterat",color:"#c0392b",bg:"#fdf0ee"},
  {id:"soon",label:"Mellan",color:"#b8815a",bg:"#fbeee6"},
  {id:"project",label:"Långsiktigt",color:"#7b7cb8",bg:"#eef0f8"},
  {id:"someday",label:"Pausat",color:"#9b9186",bg:"#ede8e1"},
];
const TODO_TAGS_DEFAULT=[
  {id:"hem",label:"Hem",color:"#5a8c5a",bg:"#e8f0e8"},
  {id:"admin",label:"Admin",color:"#4a5a8c",bg:"#eef0f8"},
  {id:"kul",label:"Kul",color:"#b8815a",bg:"#fbeee6"},
  {id:"barn",label:"Barn",color:"#2980b9",bg:"#e8f4fb"},
];
const TODO_STATUS=[
  {id:"open",label:"Att göra"},{id:"in_progress",label:"Påbörjad"},
  {id:"waiting",label:"Väntar"},{id:"done",label:"Klar"},
];
const statusStyle={
  open:{color:"#9b9186",bg:"transparent",border:"1.5px solid #d6d0c4"},
  in_progress:{color:"#5a8c5a",bg:"#e8f0e8",border:"1.5px solid #5a8c5a44"},
  waiting:{color:"#b8815a",bg:"#fbeee6",border:"1.5px solid #b8815a44"},
  done:{color:"#5a8c5a",bg:"#5a8c5a",border:"none"},
};

function Todo({viewerId}){
  const [todoTags,setTodoTags]=useLS("peas_todo_tags",TODO_TAGS_DEFAULT);
  const TODO_TAGS=todoTags;
  const [showTagMgr,setShowTagMgr]=useState(false);
  const [newTagForm,setNewTagForm]=useState({label:"",color:"#5a8c5a",bg:"#e8f0e8"});
  const TAG_COLORS=[
    {c:"#5a8c5a",b:"#e8f0e8"},{c:"#4a5a8c",b:"#eef0f8"},{c:"#b8815a",b:"#fbeee6"},
    {c:"#2980b9",b:"#e8f4fb"},{c:"#c0392b",b:"#fdf0ee"},{c:"#9b9186",b:"#ede8e1"},
  ];
  const [items,setItems]=useLS(KEYS.todo,[
    {id:1,text:"Boka tandläkare",tag:"admin",person:"b",bucket:"soon",status:"open"},
    {id:2,text:"Serva cykeln",tag:"hem",person:"a",bucket:"someday",status:"open"},
    {id:4,text:"Ansökt om förskola",tag:"barn",person:"a",bucket:"project",status:"waiting",waitingFor:"Svar från förskolan"},
  ]);
  const [show,setShow]=useState(false);
  const [editItem,setEditItem]=useState(null);
  const ef={text:"",tag:"hem",person:null,bucket:"soon",status:"open",waitingFor:"",dueDate:"",hiddenFrom:null};
  const [f,setF]=useState(ef);
  const [activeBucket,setActiveBucket]=useState("all");
  const visible=filterTodosForViewer(items,viewerId);

  const save=()=>{
    if(!f.text.trim())return;
    const payload={...f,person:f.person||null,hiddenFrom:f.hiddenFrom||null,dueDate:f.dueDate||null};
    if(editItem){setItems(items.map(i=>i.id===editItem?{...i,...payload}:i));setEditItem(null);}
    else setItems([...items,{id:Date.now(),...payload}]);
    setF(ef);setShow(false);
  };
  const openEdit=it=>{setF({text:it.text,tag:it.tag,person:it.person||null,bucket:it.bucket,status:it.status,waitingFor:it.waitingFor||"",dueDate:it.dueDate||"",hiddenFrom:it.hiddenFrom||null});setEditItem(it.id);setShow(true);};
  const cycleStatus=it=>{const order=["open","in_progress","waiting","done"];const next=order[(order.indexOf(it.status)+1)%order.length];setItems(items.map(i=>i.id===it.id?{...i,status:next}:i));};
  const remove=id=>setItems(items.filter(i=>i.id!==id));
  const shown=activeBucket==="all"?visible.filter(i=>i.status!=="done"):activeBucket==="done"?visible.filter(i=>i.status==="done"):visible.filter(i=>i.bucket===activeBucket&&i.status!=="done");

  return(
    <div>
      <SHdr title="Att göra" onAdd={()=>{setEditItem(null);setF(ef);setShow(true);}}>
        <button onClick={()=>setShowTagMgr(true)} title="Hantera kategorier" style={{background:"none",border:"none",cursor:"pointer",color:"#9b9186",padding:2}}><Ic n="tag" s={18}/></button>
      </SHdr>
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
        {[{id:"all",label:"Alla öppna",color:"#2c2420"},...BUCKETS,{id:"done",label:"Klart",color:"#5a8c5a"}].map(b=>(
          <button key={b.id} onClick={()=>setActiveBucket(b.id)} style={{padding:"6px 12px",borderRadius:20,fontSize:12,cursor:"pointer",fontFamily:"inherit",background:activeBucket===b.id?b.color:"#ede8e1",color:activeBucket===b.id?"#fff":"#6b6357",border:"none",fontWeight:activeBucket===b.id?500:400}}>
            {b.label} <span style={{marginLeft:2,opacity:.7,fontSize:11}}>{b.id==="all"?visible.filter(i=>i.status!=="done").length:b.id==="done"?visible.filter(i=>i.status==="done").length:visible.filter(i=>i.bucket===b.id&&i.status!=="done").length}</span>
          </button>
        ))}
      </div>
      {shown.length===0&&<Empty n="todo" text="Ingenting här!"/>}
      <Card>
        {shown.map((it,i)=>{
          const tag=TODO_TAGS.find(t=>t.id===it.tag);const p=PERSONS.find(p=>p.id===it.person);
          const bkt=BUCKETS.find(b=>b.id===it.bucket);const ss=statusStyle[it.status]||statusStyle.open;
          return(
            <div key={it.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"12px 14px",borderBottom:i<shown.length-1?"0.5px solid #f2ede6":"none"}}>
              <button onClick={()=>cycleStatus(it)} title="Byt status" style={{width:22,height:22,borderRadius:it.status==="done"?"50%":6,flexShrink:0,marginTop:2,border:ss.border,background:ss.bg,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",padding:0}}>
                {it.status==="done"&&<Ic n="check" s={12} color="#fff"/>}
                {it.status==="waiting"&&<span style={{fontSize:9,fontWeight:700,color:"#b8815a"}}>…</span>}
                {it.status==="in_progress"&&<span style={{fontSize:8,fontWeight:700,color:"#5a8c5a"}}>▶</span>}
              </button>
              <div style={{flex:1,minWidth:0}} onClick={()=>openEdit(it)}>
                <div style={{fontSize:15,color:"#2c2420",textDecoration:it.status==="done"?"line-through":"none",opacity:it.status==="done"?0.5:1,cursor:"pointer"}}>{it.text}</div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4,flexWrap:"wrap"}}>
                  {tag&&<span style={{fontSize:11,padding:"2px 7px",borderRadius:6,background:tag.bg,color:tag.color,fontWeight:500}}>{tag.label}</span>}
                  {bkt&&it.status!=="done"&&<span style={{fontSize:11,padding:"2px 7px",borderRadius:6,background:bkt.bg,color:bkt.color}}>{bkt.label}</span>}
                  {it.dueDate&&<span style={{fontSize:11,color:it.dueDate<TODAY?"#c0392b":"#9b9186"}}>⏰ {it.dueDate}</span>}
                  {it.status==="waiting"&&it.waitingFor&&<span style={{fontSize:11,color:"#b8815a",fontStyle:"italic"}}>⏳ {it.waitingFor}</span>}
                  {todoVisibility(viewerId,it.hiddenFrom)==="me"&&<span style={{fontSize:10,background:"#ede8e1",color:"#6b6357",padding:"2px 6px",borderRadius:6}}>Bara mig</span>}
                </div>
              </div>
              {p?<Av p={p} s={22}/>:<span style={{fontSize:10,color:"#c4bcaf"}}>—</span>}
              <button onClick={()=>remove(it.id)} style={{background:"none",border:"none",color:"#d6d0c4",cursor:"pointer",padding:2,marginTop:2}}><Ic n="x" s={16}/></button>
            </div>
          );
        })}
      </Card>
      {showTagMgr&&(
        <Modal title="Kategorier" onClose={()=>setShowTagMgr(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{fontSize:12,color:"#9b9186"}}>Tryck på en kategori för att byta namn eller färg.</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {TODO_TAGS.map(tag=>(
                <div key={tag.id} style={{display:"flex",alignItems:"center",gap:8,background:"#f7f4ef",borderRadius:10,padding:"8px 12px"}}>
                  <div style={{width:12,height:12,borderRadius:"50%",background:tag.color,flexShrink:0}}/>
                  <input style={{...inp,flex:1,fontSize:13,padding:"6px 10px"}} value={tag.label}
                    onChange={e=>setTodoTags(todoTags.map(t=>t.id===tag.id?{...t,label:e.target.value}:t))}/>
                  <div style={{display:"flex",gap:4}}>
                    {TAG_COLORS.map(({c,b})=>(
                      <button key={c} onClick={()=>setTodoTags(todoTags.map(t=>t.id===tag.id?{...t,color:c,bg:b}:t))}
                        style={{width:20,height:20,borderRadius:"50%",background:c,border:tag.color===c?"2.5px solid #2c2420":"2.5px solid transparent",cursor:"pointer",padding:0}}/>
                    ))}
                  </div>
                  <button onClick={()=>setTodoTags(todoTags.filter(t=>t.id!==tag.id))}
                    style={{background:"none",border:"none",color:"#d6d0c4",cursor:"pointer",padding:2}}><Ic n="x" s={15}/></button>
                </div>
              ))}
            </div>
            <div style={{display:"flex",gap:8}}>
              <input style={{...inp,flex:1}} placeholder="Ny kategori…" value={newTagForm.label}
                onChange={e=>setNewTagForm({...newTagForm,label:e.target.value})}
                onKeyDown={e=>{if(e.key==="Enter"&&newTagForm.label.trim()){
                  setTodoTags([...todoTags,{id:Date.now().toString(),...newTagForm,label:newTagForm.label.trim()}]);
                  setNewTagForm({label:"",color:"#5a8c5a",bg:"#e8f0e8"});
                }}}/>
              <button onClick={()=>{if(!newTagForm.label.trim())return;setTodoTags([...todoTags,{id:Date.now().toString(),...newTagForm,label:newTagForm.label.trim()}]);setNewTagForm({label:"",color:"#5a8c5a",bg:"#e8f0e8"});}}
                style={{width:44,height:44,borderRadius:12,background:"#b8815a",border:"none",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",padding:0}}>
                <Ic n="plus" s={18}/>
              </button>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {TAG_COLORS.map(({c,b})=>(
                <button key={c} onClick={()=>setNewTagForm({...newTagForm,color:c,bg:b})}
                  style={{width:26,height:26,borderRadius:"50%",background:c,border:newTagForm.color===c?"3px solid #2c2420":"3px solid transparent",cursor:"pointer",padding:0}}/>
              ))}
            </div>
          </div>
        </Modal>
      )}

      {show&&(
        <Modal title={editItem?"Redigera uppgift":"Ny uppgift"} onClose={()=>{setShow(false);setEditItem(null);}}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <input style={inp} placeholder="Vad ska göras?" value={f.text} onChange={e=>setF({...f,text:e.target.value})} onKeyDown={e=>e.key==="Enter"&&save()} autoFocus/>
            <div>
              <div style={{fontSize:12,color:"#9b9186",marginBottom:8}}>Prioritet</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {BUCKETS.map(b=>(<button key={b.id} onClick={()=>setF({...f,bucket:b.id})} style={{padding:"9px 10px",borderRadius:10,fontSize:13,cursor:"pointer",fontFamily:"inherit",textAlign:"left",background:f.bucket===b.id?b.bg:"#f7f4ef",color:f.bucket===b.id?b.color:"#6b6357",border:f.bucket===b.id?`1.5px solid ${b.color}55`:"1.5px solid transparent",fontWeight:f.bucket===b.id?500:400}}>{b.label}</button>))}
              </div>
            </div>
            <div>
              <div style={{fontSize:12,color:"#9b9186",marginBottom:8}}>Status</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {TODO_STATUS.map(s=>(<button key={s.id} onClick={()=>setF({...f,status:s.id})} style={{padding:"8px 4px",borderRadius:10,fontSize:12,cursor:"pointer",fontFamily:"inherit",background:f.status===s.id?"#e8f0e8":"#ede8e1",color:f.status===s.id?"#3a6b3a":"#6b6357",border:f.status===s.id?"1.5px solid #5a8c5a44":"1.5px solid transparent"}}>{s.label}</button>))}
              </div>
            </div>
            {f.status==="waiting"&&<input style={inp} placeholder="Väntar på vad?" value={f.waitingFor} onChange={e=>setF({...f,waitingFor:e.target.value})}/>}
            <div><div style={{fontSize:12,color:"#9b9186",marginBottom:6}}>Deadline (valfritt)</div><input style={inp} type="date" value={f.dueDate||""} onChange={e=>setF({...f,dueDate:e.target.value})}/></div>
            <div>
              <div style={{fontSize:12,color:"#9b9186",marginBottom:8}}>Kategori</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {TODO_TAGS.map(t=>(<button key={t.id} onClick={()=>setF({...f,tag:t.id})} style={{padding:"7px 12px",borderRadius:10,fontSize:12,cursor:"pointer",fontFamily:"inherit",background:f.tag===t.id?t.bg:"#ede8e1",color:f.tag===t.id?t.color:"#6b6357",border:f.tag===t.id?`1.5px solid ${t.color}44`:"1.5px solid transparent",fontWeight:f.tag===t.id?500:400}}>{t.label}</button>))}
              </div>
            </div>
            <PPick val={f.person} onChange={v=>setF({...f,person:v})} label="Vem ansvarar?" allowNone/>
            <div>
              <div style={{fontSize:12,color:"#9b9186",marginBottom:6}}>Synlighet</div>
              <div style={{display:"flex",gap:8}}>
                {(()=>{const partner=viewerId==="a"?"b":"a";const vis=todoVisibility(viewerId,f.hiddenFrom);return(<>
                  <button onClick={()=>setF({...f,hiddenFrom:partner})} style={{flex:1,padding:"10px",borderRadius:10,fontSize:13,cursor:"pointer",fontFamily:"inherit",background:vis==="me"?"#fbeee6":"#ede8e1",color:vis==="me"?"#b8815a":"#6b6357",border:vis==="me"?"1.5px solid #b8815a44":"1.5px solid transparent",fontWeight:vis==="me"?500:400}}>Bara mig</button>
                  <button onClick={()=>setF({...f,hiddenFrom:null})} style={{flex:1,padding:"10px",borderRadius:10,fontSize:13,cursor:"pointer",fontFamily:"inherit",background:vis==="both"?"#e8f0e8":"#ede8e1",color:vis==="both"?"#3a6b3a":"#6b6357",border:vis==="both"?"1.5px solid #5a8c5a44":"1.5px solid transparent",fontWeight:vis==="both"?500:400}}>Båda</button>
                </>);})()}
              </div>
            </div>
            <button style={btnP} onClick={save}>{editItem?"Spara ändringar":"Lägg till"}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── EXPIRY ───────────────────────────────────────────────────────────────────
function ExpiryPanel(){
  const [items,setItems]=useLS(KEYS.expiry,[{id:1,title:"Sonens pass",expires:"2028-07-25",remind:"6m",remindDays:180,icon:"🛂"}]);
  const [show,setShow]=useState(false);
  const [f,setF]=useState({title:"",expires:"",remind:"3m",remindDays:null,icon:"📋"});
  const save=()=>{
    if(!f.title.trim()||!f.expires)return;
    const days=f.remind==="custom"?parseInt(f.remindDays,10):(REMIND_OPTS.find(r=>r.id===f.remind)?.days??30);
    setItems([...items,{id:Date.now(),title:f.title.trim(),expires:f.expires,remind:f.remind,remindDays:days,icon:f.icon}]);
    setF({title:"",expires:"",remind:"3m",remindDays:null,icon:"📋"});setShow(false);
  };
  return(
    <div>
      <SHdr title="Påminnelser" onAdd={()=>setShow(true)}/>
      {items.length===0&&<Empty n="bell" text="Lägg till pass, försäkringar, licenser…"/>}
      <Card>
        {items.map((ex,i)=>{const due=expiryAlertDate(ex);return(
          <div key={ex.id} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderBottom:i<items.length-1?"0.5px solid #f2ede6":"none"}}>
            <span style={{fontSize:18}}>{ex.icon||"📋"}</span>
            <div style={{flex:1}}><div style={{fontSize:14,color:"#2c2420"}}>{ex.title}</div><div style={{fontSize:11,color:"#9b9186"}}>Utgår {ex.expires} · påminn {ex.remindDays} dagar innan</div></div>
            {due&&<span style={{fontSize:10,background:"#fff3cd",color:"#b8600d",padding:"2px 8px",borderRadius:6}}>Snart</span>}
            <button onClick={()=>setItems(items.filter(x=>x.id!==ex.id))} style={{background:"none",border:"none",color:"#d6d0c4",cursor:"pointer",padding:2}}><Ic n="x" s={16}/></button>
          </div>
        );})}
      </Card>
      {show&&(
        <Modal title="Nytt förfallodatum" onClose={()=>setShow(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <input style={inp} placeholder="T.ex. Sonens pass" value={f.title} onChange={e=>setF({...f,title:e.target.value})} autoFocus/>
            <input style={inp} type="date" value={f.expires} onChange={e=>setF({...f,expires:e.target.value})}/>
            <div>
              <div style={{fontSize:12,color:"#9b9186",marginBottom:8}}>Påminn i förväg</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {REMIND_OPTS.map(r=>(<button key={r.id} onClick={()=>setF({...f,remind:r.id,remindDays:r.days})} style={{padding:"7px 12px",borderRadius:10,fontSize:12,cursor:"pointer",fontFamily:"inherit",background:f.remind===r.id?"#fbeee6":"#ede8e1",color:f.remind===r.id?"#b8815a":"#6b6357",border:f.remind===r.id?"1.5px solid #b8815a44":"1.5px solid transparent"}}>{r.label}</button>))}
              </div>
            </div>
            {f.remind==="custom"&&<input style={inp} type="number" placeholder="Antal dagar innan" value={f.remindDays||""} onChange={e=>setF({...f,remindDays:e.target.value})}/>}
            <button style={btnP} onClick={save}>Spara</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── CALENDAR ─────────────────────────────────────────────────────────────────
const ECOLS=["#b8815a","#5a8c5a","#7b7cb8","#c0392b","#2980b9"];
const RECURRENCE_OPTS=[
  {id:"none",label:"Ingen upprepning"},
  {id:"daily",label:"Varje dag"},
  {id:"weekly",label:"Varje vecka"},
  {id:"monthly",label:"Varje månad"},
  {id:"yearly",label:"Varje år"},
];

function Calendar(){
  const today=new Date();
  const [vd,setVd]=useState(new Date(today.getFullYear(),today.getMonth(),1));
  const todayStr=fmt(today);
  const [sub,setSub]=useState("cal");
  const [userEvents,setUserEvents]=useLS(KEYS.events,[
    {id:1,title:"Middag hos föräldrarna",date:fmt(new Date(today.getFullYear(),today.getMonth(),5)),person:"both",color:"#b8815a",recurrence:"none"},
    {id:2,title:"Yoga",date:fmt(new Date(today.getFullYear(),today.getMonth(),8)),person:"b",color:"#5a8c5a",time:"18:00",endTime:"19:00",recurrence:"none"},
  ]);
  const [expiryItems]=useLS(KEYS.expiry,[]);
  const [show,setShow]=useState(false);
  const [editId,setEditId]=useState(null);
  const [sel,setSel]=useState(null);
  const [showMonthPicker,setShowMonthPicker]=useState(false);
  const [pickerYear,setPickerYear]=useState(()=>new Date().getFullYear());

  const yr=vd.getFullYear(),mo=vd.getMonth();
  const monthStart=fmt(new Date(yr,mo,1));
  const monthEnd=fmt(new Date(yr,mo+1,0));
  const FAR=addDaysStr(todayStr,5475);

  const expandedUser=expandRecurringUserEvents(expandMultiDayEvents(userEvents),monthStart,FAR);
  const allEvents=[...expandedUser,...expiryToCalendarEvents(expiryItems)];

  const startOff=(new Date(yr,mo,1).getDay()+6)%7;
  const days=new Date(yr,mo+1,0).getDate();
  const prevDays=new Date(yr,mo,0).getDate();
  const evFor=ds=>allEvents.filter(e=>e.date===ds);
  const upcoming=[...allEvents].filter(e=>e.date>=todayStr).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,12);

  const dayLabel=ds=>{
    const d=new Date(ds+"T00:00:00");const diff=Math.round((d-today)/86400000);
    if(diff===0)return"Idag";if(diff===1)return"Imorgon";
    return["Sön","Mån","Tis","Ons","Tor","Fre","Lör"][d.getDay()]+" "+d.getDate()+"/"+(d.getMonth()+1);
  };

  const emptyF=()=>({title:"",date:sel||todayStr,endDate:"",person:"both",color:"#b8815a",time:"",endTime:"",allDay:false,recurrence:"none",note:""});
  const [f,setF]=useState(emptyF());

  const openNew=()=>{setEditId(null);setF(emptyF());setShow(true);};
  const openEdit=ev=>{
    if(ev.isExpiry)return;
    // For recurring instances, find and edit the base event
    const baseId=ev._recurInstance?ev._recurBase:ev.id;
    const orig=userEvents.find(e=>e.id===baseId)||userEvents.find(e=>e.id===ev.id);
    if(!orig)return;
    setEditId(orig.id);
    setF({title:orig.title,date:orig.date,endDate:orig.endDate||"",person:orig.person,color:orig.color,
      time:orig.time||"",endTime:orig.endTime||"",allDay:orig.allDay||false,
      recurrence:orig.recurrence||"none",note:orig.note||""});
    setShow(true);
  };
  const closeModal=()=>{setShow(false);setEditId(null);};

  const saveEv=()=>{
    if(!f.title.trim())return;
    const time=f.allDay?null:normalizeTime(f.time);
    const endTime=f.allDay?null:normalizeTime(f.endTime);
    const payload={
      ...f,title:f.title.trim(),
      time,endTime,
      endDate:(!f.allDay&&f.endDate&&f.endDate>f.date)?f.endDate:null,
      allDay:f.allDay,
      recurrence:f.recurrence||"none",
      note:f.note||""
    };
    if(editId)setUserEvents(userEvents.map(e=>e.id===editId?{...e,...payload}:e));
    else setUserEvents([...userEvents,{id:Date.now(),...payload}]);
    closeModal();
  };
  const [showDelConfirm,setShowDelConfirm]=useState(false);
  const isRecurringEdit=editId&&userEvents.find(e=>e.id===editId)?.recurrence&&userEvents.find(e=>e.id===editId)?.recurrence!=="none";
  const deleteEv=(id,mode)=>{
    if(mode==="single"&&isRecurringEdit){
      // Add this date to the event's exceptions list
      setUserEvents(userEvents.map(e=>e.id===id?{...e,exceptions:[...(e.exceptions||[]),f.date]}:e));
    } else {
      setUserEvents(userEvents.filter(e=>e.id!==id));
    }
    closeModal();setShowDelConfirm(false);
  };

  if(sub==="expiry") return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <button onClick={()=>setSub("cal")} style={{flex:1,padding:"8px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:"inherit",background:"#ede8e1",color:"#6b6357"}}>Kalender</button>
        <button style={{flex:1,padding:"8px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:"inherit",background:"#2c2420",color:"#fff",fontWeight:500}}>Påminnelser</button>
      </div>
      <ExpiryPanel/>
    </div>
  );

  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <button style={{flex:1,padding:"8px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:"inherit",background:"#2c2420",color:"#fff",fontWeight:500}}>Kalender</button>
        <button onClick={()=>setSub("expiry")} style={{flex:1,padding:"8px",borderRadius:10,border:"none",cursor:"pointer",fontFamily:"inherit",background:"#ede8e1",color:"#6b6357"}}>Påminnelser</button>
      </div>
      <SHdr title="Kalender" onAdd={openNew}/>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <button onClick={()=>setVd(new Date(yr,mo-1,1))} style={{background:"none",border:"none",cursor:"pointer",color:"#6b6357",padding:4}}><Ic n="chevL" s={20}/></button>
        <button onClick={()=>setShowMonthPicker(!showMonthPicker)} style={{fontFamily:"'DM Serif Display',serif",fontSize:17,color:"#2c2420",background:"none",border:"none",cursor:"pointer",padding:"4px 8px",borderRadius:8}}>
          {MONTHS[mo]} {yr} ▾
        </button>
        <button onClick={()=>setVd(new Date(yr,mo+1,1))} style={{background:"none",border:"none",cursor:"pointer",color:"#6b6357",padding:4}}><Ic n="chevR" s={20}/></button>
      </div>
      {showMonthPicker&&(
        <div style={{background:"#fff",borderRadius:16,border:"0.5px solid #e2ddd6",padding:16,marginBottom:12,boxShadow:"0 4px 20px rgba(0,0,0,0.08)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <button onClick={()=>setPickerYear(y=>y-1)} style={{background:"none",border:"none",cursor:"pointer",color:"#6b6357",padding:4}}><Ic n="chevL" s={18}/></button>
            <span style={{fontWeight:600,color:"#2c2420"}}>{pickerYear}</span>
            <button onClick={()=>setPickerYear(y=>y+1)} style={{background:"none",border:"none",cursor:"pointer",color:"#6b6357",padding:4}}><Ic n="chevR" s={18}/></button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
            {MONTHS.map((m,i)=>(
              <button key={i} onClick={()=>{setVd(new Date(pickerYear,i,1));setShowMonthPicker(false);}}
                style={{padding:"7px 4px",borderRadius:10,fontSize:12,cursor:"pointer",fontFamily:"inherit",border:"none",
                  background:pickerYear===yr&&i===mo?"#b8815a":"#f7f4ef",
                  color:pickerYear===yr&&i===mo?"#fff":"#2c2420",
                  fontWeight:pickerYear===yr&&i===mo?600:400}}>
                {m.slice(0,3)}
              </button>
            ))}
          </div>
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:14}}>
        {WEEKDAYS_SHORT.map(d=>(<div key={d} style={{textAlign:"center",fontSize:10,color:"#9b9186",padding:"4px 0",fontWeight:500}}>{d}</div>))}
        {Array.from({length:startOff}).map((_,i)=>(<div key={"p"+i} style={{padding:"6px 0",textAlign:"center",fontSize:12,color:"#d6d0c4"}}>{prevDays-startOff+i+1}</div>))}
        {Array.from({length:days}).map((_,i)=>{
          const day=i+1;
          const ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          const isToday=ds===todayStr,evs=evFor(ds),isSel=sel===ds,conflict=hasDayConflict(evs);
          return(
            <div key={day} onClick={()=>setSel(isSel?null:ds)} style={{padding:"5px 0",textAlign:"center",fontSize:12,cursor:"pointer",borderRadius:8,position:"relative",background:isToday?"#b8815a":"transparent",color:isToday?"#fff":"#2c2420",fontWeight:isToday||isSel?600:400,outline:isSel&&!isToday?"2.5px solid #b8815a":"none",outlineOffset:"-2px"}}>
              {day}
              {(conflict||isHighLoad(evs))&&!isToday&&<div style={{position:"absolute",top:2,right:2,width:5,height:5,borderRadius:"50%",background:conflict?"#e74c3c":"#f39c12"}}/>}
              {evs.length>0&&<div style={{position:"absolute",bottom:2,left:"50%",transform:"translateX(-50%)",display:"flex",gap:2}}>{evs.slice(0,3).map((ev,ei)=>(<div key={ei} style={{width:4,height:4,borderRadius:"50%",background:isToday?"#fff":ev.color}}/>))}</div>}
            </div>
          );
        })}
      </div>

      {sel&&(
        <Card style={{marginBottom:12}}>
          {(()=>{const c=hasDayConflict(evFor(sel)),h=isHighLoad(evFor(sel));return(c||h)&&<div style={{padding:"8px 14px",background:"#fff3cd",fontSize:12,color:"#7a4400",borderBottom:"0.5px solid #f2ede6"}}>⚠️ {c?"Tidskonflikt":"Mycket på schemat"}</div>;})()}
          {evFor(sel).length===0?(
            <div style={{padding:"16px 14px",textAlign:"center"}}>
              <div style={{fontSize:13,color:"#9b9186",marginBottom:10}}>Inga händelser</div>
              <button onClick={()=>{setF({...emptyF(),date:sel});setEditId(null);setShow(true);}} style={{fontSize:13,color:"#b8815a",background:"#fbeee6",border:"none",borderRadius:10,padding:"8px 14px",cursor:"pointer",fontFamily:"inherit"}}>+ Lägg till</button>
            </div>
          ):evFor(sel).map((ev,i,a)=>{
            const p=ev.person==="both"?null:PERSONS.find(p=>p.id===ev.person);
            const editable=!ev.isExpiry&&!ev.isPickup&&!ev.isActivity;
            return(
              <div key={ev.id+i} onClick={()=>editable&&openEdit(ev)} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"12px 14px",borderBottom:i<a.length-1?"0.5px solid #f2ede6":"none",cursor:editable?"pointer":"default"}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:ev.color,flexShrink:0,marginTop:4}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,color:"#2c2420"}}>{ev.title}{ev._multiDay?" 📅":""}{ev._recurInstance?" 🔁":""}</div>
                  <div style={{fontSize:11,color:"#9b9186"}}>{fmtEvTime(ev)}</div>
                  {ev.note&&<div style={{fontSize:12,color:"#6b6357",marginTop:2,fontStyle:"italic"}}>{ev.note}</div>}
                </div>
                {ev.isExpiry&&<span style={{fontSize:10,background:"#fdebd0",color:"#d35400",padding:"2px 6px",borderRadius:6}}>Påminnelser</span>}
                {ev.recurring&&<span style={{fontSize:10,background:"#fbeee6",color:"#b8815a",padding:"2px 6px",borderRadius:6}}>Återk.</span>}
                {p?<Av p={p} s={22}/>:<span style={{fontSize:11,color:"#9b9186"}}>Båda</span>}
                {editable&&<Ic n="pencil" s={16} color="#c4bcaf"/>}
              </div>
            );
          })}
        </Card>
      )}

      <div style={{fontSize:13,color:"#9b9186",marginBottom:10,fontWeight:500}}>Kommande</div>
      {upcoming.length===0&&<Empty n="cal" text="Inga kommande händelser"/>}
      <Card>
        {upcoming.map((ev,i)=>{
          const p=ev.person==="both"?null:PERSONS.find(p=>p.id===ev.person);const editable=!ev.isExpiry&&!ev.isPickup&&!ev.isActivity;
          return(
            <div key={ev.id+(ev._multiDay?ev.date:"")+(ev._recurInstance?ev.date:"")} onClick={()=>editable&&openEdit(ev)} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 14px",borderBottom:i<upcoming.length-1?"0.5px solid #f2ede6":"none",cursor:editable?"pointer":"default"}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:ev.color,flexShrink:0,marginTop:4}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:14,color:"#2c2420"}}>{ev.title}{ev._multiDay&&!ev._multiFirst?" (forts.)":""}</div>
                <div style={{fontSize:11,color:"#9b9186"}}>{dayLabel(ev.date)}{fmtEvTime(ev)?` · ${fmtEvTime(ev)}`:""}</div>
                {ev.note&&<div style={{fontSize:11,color:"#6b6357",fontStyle:"italic"}}>{ev.note}</div>}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:3,alignItems:"flex-end"}}>
                {ev.isExpiry&&<span style={{fontSize:10,background:"#fdebd0",color:"#d35400",padding:"2px 6px",borderRadius:6}}>Påminnelser</span>}
                {ev.recurring&&<span style={{fontSize:10,background:"#fbeee6",color:"#b8815a",padding:"2px 6px",borderRadius:6}}>Återk.</span>}
                {ev._recurInstance&&<span style={{fontSize:10,background:"#e8f0e8",color:"#5a8c5a",padding:"2px 6px",borderRadius:6}}>🔁</span>}

            <div>
              <div style={{fontSize:12,color:"#9b9186",marginBottom:8}}>Färg</div>
              <div style={{display:"flex",gap:8}}>{ECOLS.map(c=>(<button key={c} onClick={()=>setF({...f,color:c})} style={{width:28,height:28,borderRadius:"50%",background:c,border:f.color===c?"3px solid #2c2420":"3px solid transparent",cursor:"pointer"}}/>))}</div>

            </div>

            <button style={btnP} onClick={saveEv}>{editId?"Spara ändringar":"Lägg till händelse"}</button>

            {editId&&showDelConfirm&&(
              <div style={{background:"#fdf0ee",borderRadius:14,padding:14,display:"flex",flexDirection:"column",gap:10}}>

}

const CATS=[
  {id:"mat",label:"Mat & handel",icon:"🛒"},{id:"hem",label:"Hem & bostad",icon:"🏠"},
  {id:"noje",label:"Nöje & resor",icon:"✈️"},{id:"transport",label:"Transport",icon:"🚗"},
  {id:"ovrigt",label:"Övrigt",icon:"💳"},
];
const SPLIT_TYPES=[
  {id:"full",label:"Jag lade ut hela",desc:"Motparten är skyldig halva",icon:"💸"},
  {id:"half",label:"Delat lika",desc:"Vi betalade varsitt håll",icon:"🤝"},
  {id:"mine",label:"Bara mitt",desc:"Räknas ej mot den andre",icon:"👤"},
  {id:"theirs",label:"Bara sambons",desc:"Ingen påverkan på mig",icon:"🔄"},
];
function calcImpact(e){
  const a=e.amount;
  if(e.splitType==="half"||e.splitType==="mine"||e.splitType==="theirs")return{affectsA:0,affectsB:0};
  if(e.person==="a")return{affectsA:a/2,affectsB:-(a/2)};
  return{affectsA:-(a/2),affectsB:a/2};
}
const sek=n=>{
  const abs=Math.abs(Math.round(n));
  const s=abs.toLocaleString("sv-SE")+" kr";
  return n<0?"-"+s:s;
};

function ClosedPeriodRow({cp}){
  const [expanded,setExpanded]=useState(false);
  const r=cp.closedRecord||{};
  return(
    <div style={{background:"#f7f4ef",borderRadius:14,overflow:"hidden",border:"0.5px solid #e2ddd6"}}>

          <div style={{fontSize:11,color:"#9b9186",marginTop:2}}>Uppgjord {cp.closedDate||""} · {r.count||0} utlägg · {sek((r.totA||0)+(r.totB||0))}</div>
        </div>
        <span style={{color:"#c4bcaf",fontSize:14}}>{expanded?"▾":"▸"}</span>
      </div>
      {expanded&&(
        <div style={{borderTop:"0.5px solid #e2ddd6"}}>
          {PERSONS.map(p=>(<div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 14px"}}><span style={{fontSize:12,color:"#9b9186"}}>{p.label} lade ut</span><span style={{fontSize:12,fontWeight:600,color:"#2c2420"}}>{sek(p.id==="a"?r.totA||0:r.totB||0)}</span></div>))}
          {r.owes&&<div style={{padding:"8px 14px",fontSize:13,color:"#b8815a",fontWeight:500}}>{r.owes.from.label} betalade {sek(r.owes.amount)} till {r.owes.to.label}</div>}
          {r.expenses&&r.expenses.length>0&&(
            <div style={{borderTop:"0.5px solid #f2ede6",padding:"10px 14px"}}>
              <div style={{fontSize:11,color:"#9b9186",marginBottom:8}}>Utlägg:</div>
              {r.expenses.map(e=>{const p=PERSONS.find(p=>p.id===e.person);return(
